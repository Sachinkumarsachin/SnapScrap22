- name: Delete workflow runs
  run: |
    runs=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
      "https://api.github.com/repos/${{ github.repository }}/actions/runs?per_page=100&status=completed" \
      | jq -r '.workflow_runs | map(.id) | .[]?')

    if [ -z "$runs" ]; then
      echo "No workflow runs found to delete."
    else
      for run_id in $runs; do
        echo "Deleting run $run_id"
        curl -s -X DELETE -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          "https://api.github.com/repos/${{ github.repository }}/actions/runs/$run_id"
      done
    fi
